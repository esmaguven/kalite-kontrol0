<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalite Kontrol — Koluman Otomotiv</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
:root {
  --navy:#0b1f4b; --navy2:#152d6e; --blue:#1e4db7; --accent:#3b82f6;
  --green:#059669; --red:#dc2626; --yellow:#d97706;
  --bg:#f0f4ff; --card:#ffffff; --border:#dde6f5; --text:#0f172a; --muted:#64748b;
  --r:10px; --sh:0 2px 12px rgba(11,31,75,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:50px;}

/* NAVBAR */
nav{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 16px rgba(11,31,75,.35);position:sticky;top:0;z-index:200}
.brand{font-weight:800;font-size:.95rem;letter-spacing:.3px}
.nav-tabs{display:flex;gap:5px}
.nav-tab{background:none;border:none;color:rgba(255,255,255,.6);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
.nav-tab.active{color:#fff;background:rgba(255,255,255,.2)}

.page{display:none;padding:20px;max-width:1000px;margin:0 auto}
.page.active{display:block}

/* LOADING & TOAST */
#loading-overlay{position:fixed;inset:0;background:rgba(11,31,75,.85);z-index:9999;display:none;align-items:center;justify-content:center;color:#fff;flex-direction:column}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;display:none;z-index:10000;font-weight:bold}

/* FORM STYLES */
.card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:20px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-weight:bold;font-size:0.85rem}
.form-group input, .form-group select, .form-group textarea {width:100%;padding:10px;border:1px solid var(--border);border-radius:6px}
.btn{padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-weight:bold;transition:0.2s}
.btn-primary{background:var(--blue);color:#fff}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p>Lütfen Bekleyin...</p></div>
<div id="toast"></div>

<nav>
  <div class="brand">KOLUMAN ÜRETİM TAKİP</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="goto('dashboard')">Panel</button>
    <button class="nav-tab" onclick="goto('fill')">Form Doldur</button>
    <button class="nav-tab" onclick="goto('sessions')">Kayıtlar</button>
  </div>
</nav>

<div id="page-dashboard" class="page active">
  <div class="card">
    <h2>Sistem Paneli</h2>
    <p>Buradan ayarları yönetebilir veya form doldurmaya başlayabilirsiniz.</p>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-primary" onclick="goto('groups')">Grupları Yönet</button>
      <button class="btn btn-primary" onclick="goto('templates')">Şablonları Yönet</button>
      <button class="btn btn-primary" onclick="goto('operators')">Operatörleri Yönet</button>
    </div>
  </div>
</div>

<div id="page-groups" class="page"> <div class="card"><h2>Gruplar</h2><button onclick="goto('dashboard')">Geri</button></div> </div>
<div id="page-templates" class="page"> <div class="card"><h2>Şablonlar</h2><button onclick="goto('dashboard')">Geri</button></div> </div>
<div id="page-operators" class="page"> <div class="card"><h2>Operatörler</h2><button onclick="goto('dashboard')">Geri</button></div> </div>
<div id="page-fill" class="page"> <div class="card"><h2>Form Doldur</h2></div> </div>
<div id="page-sessions" class="page"> <div class="card"><h2>Kayıtlar</h2></div> </div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SB_URL = 'https://mhyfpgqewriveujbbypw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oeWZwZ3Fld3JpdmV1amJieXB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDc3MzAsImV4cCI6MjA4ODg4MzczMH0.BUY8LHTjsx4pmMcXLScy-ElqZtIi6q_0-Sc7sHYWsKg';

// ============================================================
// STATE - (HATALAR BURADA DÜZELTİLDİ)
// ============================================================
const ST = { groups: [], templates: [], operators: [], sessions: [] };
let _editSessId = null; 
let _selOps = []; 

// ============================================================
// DATABASE CONNECT
// ============================================================
async function sb(method, table, body = null, params = '') {
  const options = {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if (body) options.body = JSON.stringify(body);
  
  const res = await fetch(`${SB_URL}/rest/v1/${table}${params}`, options);
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(errText);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ============================================================
// CORE LOGIC
// ============================================================
function goto(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const activeTab = Array.from(document.querySelectorAll('.nav-tab')).find(t => t.innerText.toLowerCase().includes(pageId === 'dashboard' ? 'panel' : ''));
  if(activeTab) activeTab.classList.add('active');
}

function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  t.style.background = type === 'err' ? '#dc2626' : '#0b1f4b';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function reloadAll() {
  document.getElementById('loading-overlay').style.display = 'flex';
  try {
    const [g, t, o, s] = await Promise.all([
      sb('GET', 'groups'),
      sb('GET', 'templates'),
      sb('GET', 'operators'),
      sb('GET', 'sessions?order=created_at.desc')
    ]);
    
    ST.groups = g.map(x => ({id: x.id, ...x.data}));
    ST.templates = t.map(x => ({id: x.id, ...x.data}));
    ST.operators = o.map(x => ({id: x.id, ...x.data}));
    ST.sessions = s.map(x => ({id: x.id, ...x.data}));

    console.log("Veriler yüklendi:", ST);
  } catch (err) {
    console.error(err);
    toast("Veri çekme hatası: " + err.message, "err");
  } finally {
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

// Uygulama Başlatma
window.onload = () => {
  reloadAll();
};

</script>
</body>
</html>
